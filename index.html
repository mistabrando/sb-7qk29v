<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Safari Stream Browser</title>
    <link rel="stylesheet" href="safari-static.css">
    <script defer src="safari-static-unlock-hotfix.js"></script>
  </head>
  <body>
    <div id="lockScreen" class="lock-screen">
      <form id="unlockForm" class="unlock-card">
        <h1>Stream Browser</h1>
        <p>Enter the catalog password to unlock this private Safari player.</p>
        <input id="catalogPassword" type="password" placeholder="Password" autocomplete="current-password" autofocus>
        <label class="remember-row">
          <input id="rememberUnlock" type="checkbox" checked>
          <span>Remember this device</span>
        </label>
        <button type="submit">Unlock</button>
        <span id="unlockError"></span>
      </form>
    </div>

    <header class="app-header">
      <div>
        <h1>Stream Browser</h1>
        <p id="summary">Loading local catalog...</p>
      </div>
      <button id="installHint" type="button">Direct HLS</button>
    </header>

    <main class="shell">
      <section id="playerSection" class="player-section hidden" aria-label="Player">
        <video id="video" controls playsinline preload="metadata"></video>
        <div class="now-row">
          <div>
            <h2 id="nowTitle">Choose a stream</h2>
            <p id="nowMeta">Native HLS playback, no proxy.</p>
          </div>
          <div class="actions">
            <button id="favoriteBtn" type="button" disabled>Favorite</button>
            <button id="copyBtn" type="button" disabled>Copy</button>
            <a id="openBtn" class="button disabled" href="#" target="_blank" rel="noreferrer">Open in New Tab</a>
          </div>
        </div>
        <div id="status" class="status">Ready.</div>
      </section>

      <section class="browse-section" aria-label="Browse streams">
        <div class="toolbar">
          <div class="search-wrap">
            <input id="search" type="search" placeholder="Search NBA, ESPN, TNT, movies..." autocomplete="off">
            <button id="clearSearch" type="button" aria-label="Clear search">Clear</button>
          </div>
          <div class="segmented" role="tablist" aria-label="Library">
            <button class="active" type="button" data-view="live">Live</button>
            <button type="button" data-view="favorites">Favorites</button>
            <button type="button" data-view="vod">VOD</button>
            <button type="button" data-view="series">Series</button>
          </div>
        </div>

        <div class="browser-grid">
          <aside class="category-pane">
            <h2>Categories</h2>
            <div id="categories" class="categories"></div>
          </aside>

          <section class="results-pane">
            <div class="results-head">
              <div class="results-title-row">
                <button id="backBtn" class="back-btn hidden" type="button">Back</button>
                <h2 id="resultsTitle">Live</h2>
              </div>
              <span id="resultsCount">0 streams</span>
            </div>
            <div id="results" class="results"></div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
